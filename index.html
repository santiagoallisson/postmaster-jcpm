<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postmaster Dashboard – JCPM</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e3a5f, #0f2340);
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { color: #93c5fd; font-size: 0.85rem; margin-top: 4px; }
    .meta {
      display: flex; gap: 12px; margin-top: 8px;
      font-size: 0.75rem; color: var(--muted);
    }
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 32px; background: #141722;
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .btn {
      background: #1a1d27; color: var(--muted);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 14px; font-size: 0.82rem; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn:hover { background: #2a2d3a; color: var(--text); }
    .btn.active { background: #1e3a5f; color: #93c5fd; border-color: #2a4a7f; }
    .hist-controls {
      display: none; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .hist-controls.visible { display: flex; }
    .hist-controls label { font-size: 0.82rem; color: var(--muted); }
    input[type=date] {
      background: #1a1d27; border: 1px solid var(--border);
      color: var(--text); border-radius: 6px;
      padding: 5px 10px; font-size: 0.82rem;
      color-scheme: dark;
    }
    .tag-hist {
      font-size: 0.72rem; color: #f59e0b;
      background: #451a03; padding: 2px 8px; border-radius: 10px;
    }
    main { padding: 32px; max-width: 1100px; margin: 0 auto; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #141722;
      padding: 12px 16px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    td { padding: 14px 16px; font-size: 0.88rem; }
    .name { font-weight: 600; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: .04em;
    }
    .badge::before { content:''; width:6px; height:6px; border-radius:50%; }
    .alta  { color:#22c55e; background:#14532d; } .alta::before  { background:#22c55e; }
    .media { color:#f59e0b; background:#451a03; } .media::before { background:#f59e0b; }
    .baixa { color:#f97316; background:#431407; } .baixa::before { background:#f97316; }
