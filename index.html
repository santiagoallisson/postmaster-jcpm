<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postmaster Dashboard – JCPM</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e3a5f, #0f2340);
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { color: #93c5fd; font-size: 0.85rem; margin-top: 4px; }
    .meta {
      display: flex; gap: 12px; margin-top: 8px;
      font-size: 0.75rem; color: var(--muted);
    }
    main { padding: 32px; max-width: 1100px; margin: 0 auto; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #141722;
      padding: 12px 16px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    td { padding: 14px 16px; font-size: 0.88rem; }
    .name { font-weight: 600; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: .04em;
    }
    .badge::before { content:''; width:6px; height:6px; border-radius:50%; }
    .alta  { color:#22c55e; background:#14532d; } .alta::before  { background:#22c55e; }
    .media { color:#f59e0b; background:#451a03; } .media::before { background:#f59e0b; }
    .baixa { color:#f97316; background:#431407; } .baixa::before { background:#f97316; }
    .ruim  { color:#ef4444; background:#450a0a; } .ruim::before  { background:#ef4444; }
    .nd    { color:var(--muted); background:rgba(148,163,184,.1); } .nd::before { background:var(--muted); }
    .spam-ok   { color: var(--text); }
    .spam-alto { color:#ef4444; background:#450a0a; padding:3px 8px; border-radius:6px; font-weight:700; }
    .dim       { color: var(--muted); font-size: 0.8rem; }
    .center    { display:flex; align-items:center; justify-content:center; padding:80px; flex-direction:column; gap:16px; color:var(--muted); }
    .spin      { width:32px; height:32px; border:3px solid var(--border); border-top-color:#60a5fa; border-radius:50%; animation:s .8s linear infinite; }
    @keyframes s { to { transform:rotate(360deg); } }
    .err { padding:40px; text-align:center; color:#ef4444; line-height:1.8; }
    @media(max-width:640px){ main{padding:12px;} header{padding:16px;} td,th{padding:10px 12px;} }
  </style>
</head>
<body>

<header>
  <h1>Reputação de Domínio · E-mail Marketing</h1>
  <p>Grupo JCPM · Google Postmaster Tools</p>
  <div class="meta">
    <span id="ref-date">Carregando...</span>
    <span>·</span>
    <span id="dom-count"></span>
    <span>·</span>
    <span id="load-time"></span>
  </div>
</header>

<main>
  <div class="card" id="container">
    <div class="center"><div class="spin"></div><span>Carregando dados...</span></div>
  </div>
</main>

<script>
  const SHEET_ID = '1PdsjYfnypYEnEDIklwuXItfvQfkjWuCZ6CDSA5CViYI';

  const C = { DATA:0, DOMINIO:1, SHOPPING:2, SPAM:3, REP:4, DKIM:5, SPF:6, DMARC:7, ULT:13 };

  async function load() {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Ultimo_Resultado&headers=1`;
      const res  = await fetch(url);
      const text = await res.text();
      const m    = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);\s*$/);
      if (!m) throw new Error('Formato inesperado. Verifique se a planilha está compartilhada.');
      const json = JSON.parse(m[1]);
      if (json.status !== 'ok') throw new Error(json.errors?.[0]?.message || 'Erro na planilha.');
      render(json.table.rows.map(r => r.c.map(c => c?.v ?? c?.f ?? '')));
    } catch(e) {
      document.getElementById('container').innerHTML =
        `<div class="err">❌ ${e.message}<br><small>Confirme que a planilha está compartilhada como "Qualquer pessoa com o link pode ver".</small></div>`;
    }
  }

  function badge(rep) {
    const m = { ALTA:['alta','ALTA'], MEDIA:['media','MÉDIA'], BAIXA:['baixa','BAIXA'], RUIM:['ruim','RUIM'] };
    const [cls, lbl] = m[rep] || ['nd', rep || 'SEM DADOS'];
    return `<span class="badge ${cls}">${lbl}</span>`;
  }

  function spam(val) {
    if (val === '' || val == null) return '<span class="dim">—</span>';
    const n = parseFloat(val);
    const fmt = n.toFixed(4) + '%';
    return n > 0.3 ? `<span class="spam-alto">⚠ ${fmt}</span>` : `<span class="spam-ok">${fmt}</span>`;
  }

  function pct(val) {
    const n = parseFloat(val);
    return isNaN(n) ? '<span class="dim">—</span>' : `<span class="dim">${n.toFixed(2)}%</span>`;
  }

  function render(rows) {
    document.getElementById('ref-date').textContent  = rows[0]?.[C.DATA] ? `Referência: ${rows[0][C.DATA]}` : '—';
    document.getElementById('dom-count').textContent = `${rows.length} domínios`;
    document.getElementById('load-time').textContent = `Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;

    document.getElementById('container').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Shopping</th>
            <th>Reputação</th>
            <th>Taxa de Spam</th>
            <th>DKIM</th>
            <th>SPF</th>
            <th>DMARC</th>
            <th>Última atualização Google</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td class="name">${r[C.SHOPPING] || r[C.DOMINIO]}</td>
              <td>${badge(r[C.REP])}</td>
              <td>${spam(r[C.SPAM])}</td>
              <td>${pct(r[C.DKIM])}</td>
              <td>${pct(r[C.SPF])}</td>
              <td>${pct(r[C.DMARC])}</td>
              <td class="dim">${r[C.ULT] || '—'}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  load();
  setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
