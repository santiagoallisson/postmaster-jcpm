<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postmaster Dashboard · JCPM</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f6f3;
      --bg-tertiary: #efede8;
      --bg-info: #e6f1fb;
      --text-primary: #1a1917;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --text-info: #185fa5;
      --border-light: rgba(26,25,23,0.1);
      --border-med: rgba(26,25,23,0.2);
      --border-info: #378add;
      --accent: #1a1917;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1d1b;
        --bg-secondary: #272623;
        --bg-tertiary: #302f2c;
        --bg-info: #0c2d50;
        --text-primary: #f0eeea;
        --text-secondary: #b4b2a9;
        --text-tertiary: #888780;
        --text-info: #85b7eb;
        --border-light: rgba(240,238,234,0.1);
        --border-med: rgba(240,238,234,0.2);
        --border-info: #378add;
        --accent: #f0eeea;
      }
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Open Sans', -apple-system, sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page { max-width: 1100px; margin: 0 auto; }

    /* ── HEADER ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border-light);
    }
    .header-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 15px; color: var(--text-secondary); font-style: italic;
    }
    .header-tag {
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-tertiary);
      border: 0.5px solid var(--border-med); padding: 3px 10px; border-radius: 20px;
    }

    /* ── HERO ── */
    .hero {
      background: var(--bg-secondary); border-radius: var(--radius-xl);
      padding: 2.25rem 2.5rem 2rem; margin-bottom: 2rem;
      border: 0.5px solid var(--border-light); position: relative; overflow: hidden;
    }
    .hero::after {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 220px; height: 220px; border-radius: 50%;
      background: var(--bg-tertiary); opacity: 0.7; pointer-events: none;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-secondary);
      border: 0.5px solid var(--border-med); padding: 4px 12px;
      border-radius: 20px; margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px; font-weight: 600; line-height: 1.2;
